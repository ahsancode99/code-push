<html>
    <head>
        <title>form</title>
    </head>
    <body>
        <form>
            <p>username</p>
            <input type="text" name="username"/>
            <p>
                email
            </p>
            <input type="email" placeholder="email"/>
        <p>password</p>
        <input type="password" name="password"/>
        <p>comment feedback</p>
        <textarea name="comment" rows="4" cols="15">
            enter feedback

        </textarea>
        <p>did you comment ? </p>
        <input type="radio" name="comment" value="yes" checked="checked"/>yes
        <input type="radio" name="comment" value="no" checked="checked"/>no


        </form>
        <form>
            <p>
                did you have PC
            </p>
            <select name="device">
                <option value="Laptop">Laptop</option>
                <option value="computer">computer</option>
                <option value="chrombook">chrombook</option>
                <option value="nothing">nothing</option>
            </select>
        </form>
    </body>
</html>
